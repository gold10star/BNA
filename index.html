<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BNA Reconciliation</title>

<style>
body { background:#0c0e0d; color:#e2e8e2; font-family:Arial; padding:20px; }
.wrap { max-width:700px; margin:auto; }
input,button { padding:10px; margin:8px 0; width:100%; }
button { background:#00c896; border:none; cursor:pointer; }
.preview { max-width:120px; margin-top:10px; }
.result { background:#141614; padding:15px; margin-top:20px; }
.editable { border-bottom:1px dashed #555; cursor:text; }
</style>

</head>

<body>

<div class="wrap">

<h2>BNA Reconciliation</h2>

<input type="file" id="fileInput">
<img id="preview" class="preview">

<input type="number" id="ex100" placeholder="Excess ₹100">
<input type="number" id="ex500" placeholder="Excess ₹500">
<input type="number" id="ex200" placeholder="Excess ₹200">

<button onclick="scan()">Scan</button>

<div id="status"></div>
<div id="result" class="result"></div>

</div>

<script>

let imageBase64 = "";

// Upload
document.getElementById("fileInput").onchange = e => {
  const file = e.target.files[0];
  const reader = new FileReader();
  reader.onload = () => {
    imageBase64 = reader.result.split(",")[1];
    document.getElementById("preview").src = reader.result;
  };
  reader.readAsDataURL(file);
};

// Scan
async function scan() {

  if (!imageBase64) {
    alert("Upload image first");
    return;
  }

  document.getElementById("status").innerText = "⏳ Scanning...";

  try {

    const res = await fetch("/api/scan", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ imageBase64 })
    });

    // ✅ SAFE JSON PARSE (no crash)
    let json;
    try {
      json = await res.json();
    } catch {
      throw new Error("Server returned invalid response");
    }

    // ✅ HANDLE BACKEND ERROR
    if (!json.success) {
      throw new Error(json.error || "Scan failed");
    }

    // ✅ GET AI OUTPUT
    let raw = json.data?.choices?.[0]?.message?.content;

    if (!raw) {
      throw new Error("Empty AI response");
    }

    // Handle array response
    if (Array.isArray(raw)) {
      raw = raw.map(x => x.text || "").join("");
    }

    // Clean markdown
    raw = raw.replace(/```json|```/g, "").trim();

    // Parse AI JSON safely
    let data;
    try {
      data = JSON.parse(raw);
    } catch {
      console.error("RAW:", raw);
      throw new Error("Invalid JSON from AI");
    }

    render(data);

    document.getElementById("status").innerText = "✅ Done";

  } catch (err) {
    console.error(err);
    document.getElementById("status").innerText = "❌ " + err.message;
  }
}

// Render
function render(d) {

  const ex100 = parseInt(document.getElementById("ex100").value) || 0;
  const ex500 = parseInt(document.getElementById("ex500").value) || 0;
  const ex200 = parseInt(document.getElementById("ex200").value) || 0;

  const rows = [
    { denom:100, data:d.type2, ex:ex100 },
    { denom:500, data:d.type3, ex:ex500 },
    { denom:200, data:d.type4, ex:ex200 }
  ];

  let total = 0;

  let html = `<table border="1" width="100%">
  <tr><th>Denom</th><th>Dep</th><th>Dis</th><th>Rem</th></tr>`;

  rows.forEach(r => {
    const dep = r.data?.deposited || 0;
    const dis = r.data?.dispensed || 0;
    const rem = r.data?.remaining || 0;

    total += rem * r.denom;

    html += `
    <tr>
      <td>₹${r.denom}</td>
      <td contenteditable class="editable">${dep}</td>
      <td contenteditable class="editable">${dis}</td>
      <td contenteditable class="editable">${rem}</td>
    </tr>`;
  });

  html += `</table><br>
  <b>Total Remaining: ₹${total.toLocaleString()}</b>
  <br><br>
  <button onclick="recalc()">Recalculate</button>`;

  document.getElementById("result").innerHTML = html;
}

// Recalculate
function recalc() {

  let total = 0;

  document.querySelectorAll("table tr").forEach((r, i) => {
    if (i === 0) return;

    const denom = parseInt(r.children[0].innerText.replace("₹", ""));
    const rem = parseInt(r.children[3].innerText) || 0;

    total += denom * rem;
  });

  document.getElementById("result").innerHTML +=
    `<br><b>Updated Total: ₹${total.toLocaleString()}</b>`;
}

</script>

</body>
</html>
